max_turns: 40
temperature: 0.2
max_tokens_per_call: 65536
model_timeout_sec: 600
best_of_n: 1

# Notes on tuning these values:
#
# max_turns: 40
#   Raised from 20 after the 2026-04-22 full-benchmark baseline showed
#   26 of 89 tasks tagged turn_exhaustion (using all 20 turns without
#   solving). 40 turns gives procedural multi-step tasks (nginx, openssl,
#   configure-git-webserver) real room. Harder tasks will still hit
#   turn_exhaustion at 40 — that becomes the capability signal rather
#   than budget starvation.
#
# max_tokens_per_call: 65536
#   Raised from 2048 after 26 of 89 tasks tagged output_truncated
#   (Qwen3.6 thinking-mode exceeding the 2048 budget on a single turn).
#   64K is a generous ceiling; in practice effectively bounded by
#   model_timeout_sec below. A turn producing 10K-20K tokens of
#   reasoning_content + short content + tool_call is within budget now.
#   Watch: with 40-turn runs, long-context degradation becomes a real
#   risk — the server context is 128K. If histories exceed ~100K the
#   model's attention quality drops.
#
# model_timeout_sec: 600
#   Per-call hard cut. Raised from 180s. At thinking-mode ~35 t/s,
#   600s × 35 = ~21000 tokens per call before timeout — the actual
#   ceiling on how much max_tokens_per_call can be used. Raising
#   max_tokens without raising this would be a no-op.
#
# temperature: 0.2
#   Conservative for coding tasks. Qwen model cards recommend 0.7. The
#   server-side sampling config (systemd unit) uses 0.7, but the client
#   passes this value and overrides. Leave at 0.2 for now to keep a
#   single variable vs Gemma baselines; A/B on Qwen3.6 later.
