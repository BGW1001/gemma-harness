max_turns: 20
temperature: 0.2
max_tokens_per_call: 2048
model_timeout_sec: 180
best_of_n: 1

# Notes on tuning these values:
#
# max_turns: 20
#   GPU (b8881 + Q6_K_XL) runs at ~35-40 t/s median with thinking-mode
#   backends (Gemma 4, Qwen3.6). 20 turns is the plan-efficiency ceiling
#   observed in Track C (Qwen3.6 clears fix-git and openssl in 7-10 turns).
#   Raise to 30-40 only if a new task shape genuinely needs more.
#
# model_timeout_sec: 180
#   Per-call hard cut. Raised from 60s after Track C baseline showed
#   sanitize-git-repo uniformly hitting model_timeout at 6-7 turns under
#   the 60s cap across all three backbones. Three minutes gives thinking
#   models room to generate a longer reasoning_content without tripping
#   the watchdog.
#
# temperature: 0.2
#   Conservative for coding tasks. Qwen model cards recommend 0.7. The
#   server-side sampling config (systemd unit) uses 0.7, but the client
#   passes this value and overrides. Leave at 0.2 for now to keep a
#   single variable vs Gemma baselines; A/B on Qwen3.6 later.
